<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4cb1a7;
            --error-color: #e74c3c;
            --background-color: #f9f9f9;
            --text-color: #333;
            --light-gray: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        .form-group.error input {
            border-color: var(--error-color);
        }
        
        .error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .form-group.error .error-message {
            display: block;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-login:hover {
            background-color: var(--secondary-color);
        }
        
        .btn-login:disabled {
            background-color: var(--light-gray);
            cursor: not-allowed;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background-color: #ffebee;
            color: var(--error-color);
            border: 1px solid #ffcdd2;
        }
        
        .alert-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Bem-vindo</h1>
            <p>Faça login para acessar sua conta</p>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="emailError">Por favor, insira um e-mail válido</div>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required>
                <div class="error-message" id="passwordError">A senha deve ter pelo menos 6 caracteres</div>
            </div>
            
            <button type="submit" class="btn-login" id="loginButton">
                <span class="spinner" id="spinner"></span>
                <span id="buttonText">Entrar</span>
            </button>
        </form>
        
        <div class="login-footer">
            <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
            <p><a href="#">Esqueci minha senha</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const alertBox = document.getElementById('alertBox');
            const loginButton = document.getElementById('loginButton');
            const buttonText = document.getElementById('buttonText');
            const spinner = document.getElementById('spinner');
            
            // Função para exibir mensagens de alerta
            function showAlert(message, type) {
                alertBox.textContent = message;
                alertBox.className = type === 'error' ? 'alert alert-error' : 'alert alert-success';
                alertBox.style.display = 'block';
                
                // Esconder o alerta após 5 segundos
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 5000);
            }
            
            // Função para validar o formulário
            function validateForm() {
                let isValid = true;
                
                // Validar e-mail
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailInput.value)) {
                    emailInput.parentElement.classList.add('error');
                    isValid = false;
                } else {
                    emailInput.parentElement.classList.remove('error');
                }
                
                // Validar senha
                if (passwordInput.value.length < 6) {
                    passwordInput.parentElement.classList.add('error');
                    isValid = false;
                } else {
                    passwordInput.parentElement.classList.remove('error');
                }
                
                return isValid;
            }
            
            // Função para fazer login
            async function loginUser(credentials) {
                try {
                    // Mostrar o spinner e desabilitar o botão
                    spinner.style.display = 'inline-block';
                    buttonText.textContent = 'Autenticando...';
                    loginButton.disabled = true;
                    
                    const response = await fetch('http://localhost:3000/api/users/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(credentials)
                    });
                    
                    const data = await response.json();
                    
                    // Esconder o spinner e reabilitar o botão
                    spinner.style.display = 'none';
                    buttonText.textContent = 'Entrar';
                    loginButton.disabled = false;
                    
                    if (response.ok) {
                        // Login bem-sucedido
                        showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                        
                        // Salvar o token (se retornado pela API)
                        if (data.token) {
                            localStorage.setItem('authToken', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                        }
                        
                        // Redirecionar após um breve delay
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1500);
                    } else {
                        // Exibir mensagem de erro da API
                        showAlert(data.message || 'Erro ao fazer login. Tente novamente.', 'error');
                    }
                } catch (error) {
                    // Esconder o spinner e reabilitar o botão
                    spinner.style.display = 'none';
                    buttonText.textContent = 'Entrar';
                    loginButton.disabled = false;
                    
                    showAlert('Erro de conexão. Verifique sua internet e tente novamente.', 'error');
                    console.error('Erro no login:', error);
                }
            }
            
            // Event listener para o envio do formulário
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (validateForm()) {
                    const credentials = {
                        email: emailInput.value,
                        password: passwordInput.value
                    };
                    
                    loginUser(credentials);
                }
            });
            
            // Validação em tempo real
            emailInput.addEventListener('input', function() {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(emailInput.value)) {
                    emailInput.parentElement.classList.remove('error');
                }
            });
            
            passwordInput.addEventListener('input', function() {
                if (passwordInput.value.length >= 6) {
                    passwordInput.parentElement.classList.remove('error');
                }
            });
        });
    </script>
</body>
</html>
